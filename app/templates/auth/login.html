{% extends 'base.html' %}
{% import "bootstrap_wtf.html" as wtf %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h1 class="mb-3">{{ _('Sign In') }}</h1>
        {{ wtf.quick_form(form) }}
        <p>{{ _('New User?') }} <a href="{{ url_for('auth.register') }}">{{ _('Click to Register!') }}</a></p>
        <p>{{ _('Forgot Your Password?') }} 
            <a href="{{ url_for('auth.reset_password_request') }}">{{ _('Click to Reset It') }}</a></p>
    </div>
</div>
{% endblock %}
