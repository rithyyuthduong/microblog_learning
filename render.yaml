services:
  - type: web
    name: microblog
    env: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn microblog
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: True
      - key: FLASK_APP
        value: microblog
